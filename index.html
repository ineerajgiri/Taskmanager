<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskmanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-200 min-h-screen py-10 px-4">

    <div class="max-w-xl mx-auto bg-slate-200 p-6 rounded-xl shadow-lg">

<h1 class="text-3xl font-extrabold text-blue-900 mb-2"  >Task Manager</h1>
    <form id="new-task-form" class="space-y-4 mb-3" >
        <div>
<label class=" text-sm front-semibold text-slate-800 mb-1" >Task Title</label>
            <input type="text" id="task-title" placeholder= " What needs to be done?" 
            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-transparent text-sm bg-slate-50 transition">
        </div>

<div>
    <label class="block text-sm font-semibold text-slate-700 mb-1">Description (Optional)</label>
<textarea  id="task-description" placeholder="Description(optional)"
class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-green-500 focus:border-transparent text-sm bg-slate-50 transition"
></textarea>

</div>

<div>

<button type="submit"  class="w-full font-semibold  bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-yellow-600 text-sm font-medium shadow transition duration-200  ">Add task</button>

</div>

 </form>

<p id="form-error" class ="hidden text-red-600" ></p>

<ul id="task-list" class="space-y-4"></ul>

<div id="empty-state" class="text-center py-4 px-4 border-2 border-dashed border-red-400 rounded-xl">
   
<p class="text-slate-500 font-medium mt-2 text-lg ">No task-list Yet</p>

</div>


    </div>

    



<script src="storage.js"></script>
<script src="taskActions.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
